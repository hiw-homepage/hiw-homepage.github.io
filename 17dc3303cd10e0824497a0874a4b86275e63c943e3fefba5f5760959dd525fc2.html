        <script>
            history.replaceState(null, null, "../member");
            $('#ua').ready(function() {
                const UA = window.navigator.userAgent.toLowerCase();
                if (UA.indexOf("msie") != -1 || UA.indexOf("trident") != -1) {
                    $('[src="./image/group2.avif"]').attr('src', './image/group2.webp');
                } else if (UA.indexOf("safari") != -1) {
                    $('[src="./image/group2.avif"]').attr('src', './image/group2.webp');
                }
            });
        </script>

        <style>
            @media screen and (min-device-width: 1024px) {
                iframe {
                    height: calc(calc(100vw - 544px) * 0.5625);
                }
            }
            @media screen and (max-device-width: 1024px) {
                iframe {
                    height: calc(calc(100vw - 288px) * 0.5625);
                }
            }
            body {
                background-color: whitesmoke;
            }
            main div {
                z-index: 2;
                position: relative;
                background-color: white;
                padding: 24px 24px;
                font-family: 'Zilla Slab', serif;
                color: black;
            }
            main div h1 {
                font-weight: 300;

            iframe {
                margin: 0;
                border: 1px solid #d3d3d3;
                padding: 16px;
                width: calc(100% - 32px);
